<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/staff/menu_management.css">
</head>

<body>
    <div class="left">
        <div class="navHead">
            <div class="logo-title">UIU Canteen</div>
            <div class="logo-subtitle">Staff Portal</div>
        </div>
        <div class="nav">
            <a class="nav-item" href="staff_dashboard.html"><span>🎛️</span> Dashboard</a>
            <a class="nav-item" href="live_order_queue.html"><span>📋</span> Orders</a>
            <a class="nav-item clicked" href="menu_management.html"><span>🍴</span> Menu Management</a>
            <a class="nav-item" href="staff_analytics.html"><span>📈</span> Analytics</a>
            <a class="nav-item" href="staff_settings.html"><span>⚙️</span> Settings</a>
        </div>
        <div class="nav-bottom">
            <button class="switch-btn"><span>⇆</span> Switch to User Mode</button>
            <a class="nav-item" href="#"><span>❓</span> Help Center</a>
            <a class="nav-item logout" href="../../index.html"><span>🚪</span> Logout</a>
        </div>
    </div>

    <div class="right">
        <div class="topbar">
            <div class="title-area">
                <div class="title">Manage the Kitchen</div>
                <div class="subtitle">Curate the daily culinary experience for UIU. Update availability, adjust
                    pricing,<br>and maintain the smart menu.</div>
            </div>
            <div class="add-btn-area">
                <button class="btn-add"><span>+</span> Add New Dish</button>
            </div>
        </div>

        <div class="metrics-row">
            <div class="metric-card">
                <div class="metric-label">ACTIVE DISHES</div>
                <div class="metric-value" id="activeCount">0</div>
            </div>
            <div class="metric-card blue-card">
                <div class="metric-label">SOLD OUT ITEMS</div>
                <div class="metric-value" id="soldOutCount">0</div>
            </div>
        </div>

        <div class="filter-bar">
            <div class="search">
                <span>🔍</span>
                <input type="text" placeholder="Search dishes, categories, or tags...">
            </div>
            <div class="filter-pills">
                <button class="pill-btn active" data-category="all">All Menu</button>
                <button class="pill-btn" data-category="rice">Rice & mains</button>
                <button class="pill-btn" data-category="fast">Fast bites</button>
                <button class="pill-btn" data-category="healthy">Healthy</button>
                <button class="pill-btn" data-category="drinks">Drinks</button>
            </div>
        </div>

        <div class="menu-list" id="menuList">
            <!-- Items injected by JS -->
        </div>

        <!-- Add Item Modal -->
        <div id="addModal" class="modal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5); backdrop-filter:blur(5px);">
            <div class="modal-content" style="background:#1e1e2d; color:#fff; margin:5% auto; padding:30px; border-radius:12px; width:500px; box-shadow:0 15px 30px rgba(0,0,0,0.3);">
                <span class="close-btn" id="closeModalBtn" style="color:#aaa; float:right; font-size:28px; cursor:pointer;">&times;</span>
                <h2 style="margin-top:0;">Add New Dish</h2>
                <form id="addDishForm">
                    <div style="margin-bottom:15px;">
                        <label style="display:block; margin-bottom:5px; color:#a0a0b0;">Dish Name</label>
                        <input type="text" id="dishName" required style="width:100%; padding:10px; border-radius:8px; border:1px solid #333; background:#151521; color:#fff;">
                    </div>
                    <div style="margin-bottom:15px;">
                        <label style="display:block; margin-bottom:5px; color:#a0a0b0;">Description</label>
                        <textarea id="dishDesc" required style="width:100%; padding:10px; border-radius:8px; border:1px solid #333; background:#151521; color:#fff;"></textarea>
                    </div>
                    <div style="margin-bottom:15px;">
                        <label style="display:block; margin-bottom:5px; color:#a0a0b0;">Price (৳)</label>
                        <input type="number" step="0.01" id="dishPrice" required style="width:100%; padding:10px; border-radius:8px; border:1px solid #333; background:#151521; color:#fff;">
                    </div>
                    <div style="margin-bottom:15px;">
                        <label style="display:block; margin-bottom:5px; color:#a0a0b0;">Category</label>
                        <select id="dishCategory" required style="width:100%; padding:10px; border-radius:8px; border:1px solid #333; background:#151521; color:#fff;">
                            <option value="rice">Rice & mains</option>
                            <option value="fast">Fast bites</option>
                            <option value="healthy">Healthy</option>
                            <option value="drinks">Drinks</option>
                        </select>
                    </div>
                    <div style="margin-bottom:15px;">
                        <label style="display:block; margin-bottom:5px; color:#a0a0b0;">Image URL</label>
                        <input type="url" id="dishImage" style="width:100%; padding:10px; border-radius:8px; border:1px solid #333; background:#151521; color:#fff;">
                    </div>
                    <button type="submit" style="background:#4caf50; color:white; padding:12px 20px; border:none; border-radius:8px; cursor:pointer; width:100%; font-weight:600;">Save Dish</button>
                </form>
            </div>
        </div>

        <div class="bottom-bar">

            <div class="pagination">
                <button class="page-btn">‹</button>
                <button class="page-btn active">1</button>
                <button class="page-btn">2</button>
                <button class="page-btn">3</button>
                <button class="page-btn">›</button>
            </div>
        </div>
    </div>
    <script src="../../js/staff/menu_management.js"></script>
</body>

</html>
