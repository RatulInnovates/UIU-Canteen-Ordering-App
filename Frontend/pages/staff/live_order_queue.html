<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Order Queue</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/staff/live_order_queue.css">
</head>
<body>

<div class="app-container">
    <!-- SIDEBAR -->
    <div class="left">
        <div class="navHead">
            <div class="logo-title">UIU Canteen</div>
            <div class="logo-subtitle">Staff Portal</div>
        </div>
        <div class="nav">
            <a class="nav-item" href="staff_dashboard.html"><span>🎛️</span> Dashboard</a>
            <a class="nav-item clicked" href="live_order_queue.html"><span>📋</span> Orders</a>
            <a class="nav-item" href="menu_management.html"><span>🍴</span> Menu Management</a>
            <a class="nav-item" href="staff_analytics.html"><span>📈</span> Analytics</a>
            <a class="nav-item" href="staff_settings.html"><span>⚙️</span> Settings</a>
        </div>
        <div class="nav-bottom">
            <button class="switch-btn"><span>⇆</span> Switch to User Mode</button>
            <a class="nav-item" href="#"><span>❓</span> Help Center</a>
            <a class="nav-item logout" href="../../index.html"><span>🚪</span> Logout</a>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <!-- HEADER -->
        <header class="top-header">
            <div class="header-text">
                <h2>Live Order Queue</h2>
                <p>Real-time management for the academic rush hour.</p>
            </div>
            <div class="header-actions">
                <div class="status-live">
                    <span class="dot live-dot"></span> SYSTEM LIVE
                </div>
                <div class="avatars">
                    <span class="av av-1">AJ</span>
                    <span class="av av-2">MK</span>
                    <span class="av av-plus">+2</span>
                </div>
            </div>
        </header>

        <!-- SEARCH & FILTER QUEUE CONTROLS -->
        <div class="queue-search-container">
            <input type="text" placeholder="🔍 Search by Token # or Customer Name..." class="board-search-field">
        </div>

        <!-- KANBAN BOARD -->
        <div class="board">
            
            <!-- COLUMN 1: INCOMING -->
            <div class="board-column">
                <div class="col-header">
                    <div class="col-title"><span class="dot incoming-dot"></span> INCOMING</div>
                    <div class="col-count count-incoming" id="count-incoming">0</div>
                </div>
                <div id="col-incoming">
                    <!-- Items injected by JS -->
                </div>
            </div>

            <!-- COLUMN 2: PREPARING -->
            <div class="board-column">
                <div class="col-header">
                    <div class="col-title"><span class="dot preparing-dot"></span> PREPARING</div>
                    <div class="col-count count-preparing" id="count-preparing">0</div>
                </div>
                <div id="col-preparing">
                    <!-- Items injected by JS -->
                </div>
            </div>

            <!-- COLUMN 3: READY FOR PICKUP -->
            <div class="board-column">
                <div class="col-header">
                    <div class="col-title"><span class="dot ready-dot"></span> READY FOR PICKUP</div>
                    <div class="col-count count-ready" id="count-ready">0</div>
                </div>
                <div id="col-ready">
                    <!-- Items injected by JS -->
                </div>
            </div>

            <!-- COLUMN 4: COMPLETED -->
            <div class="board-column">
                <div class="col-header">
                    <div class="col-title"><span class="dot completed-dot"></span> COMPLETED</div>
                    <div class="col-count count-collected" id="count-collected">0</div>
                </div>
                <div id="col-collected">
                    <!-- Items injected by JS -->
                </div>
            </div>

        </div>
    </main>
</div>

<script src="../../js/staff/live_order_queue.js"></script>
</body>
</html>
