<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UIU Canteen</title>
    <link rel="stylesheet" href="../../css/student/student.css">
    <link rel="stylesheet" href="../../css/ui-feedback.css">
</head>

<body>

    <div class="container">

        <!-- NAVBAR -->
        <div class="nav">

            <div class="nav-logo">
                <a href="student_dashboard.html"><h2>UIU Canteen</h2></a>
            </div>

            <div class="nav-pages">

                <div class="nav-page nav-page-active">
                    <a href="student_dashboard.html">Home</a>
                </div>

                <div class="nav-page">
                    <a href="student_menu.html">Menu</a>
                </div>

                <div class="nav-page">
                    <a href="student_order.html">Orders</a>
                </div>

                <div class="nav-search">

                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>

                    <input type="text" class="search-input" placeholder="Search for food...">

                </div>

            </div>

            <div class="nav-right">

                <button type="button" class="icon-btn" aria-label="Notifications">
                    🔔
                </button>

                <a href="student_order.html" class="icon-btn" aria-label="Tray and checkout">
                    🛒
                    <span class="cart-badge"></span>
                </a>

                <div class="user-avatar">
                    <a href="student_settings.html">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&backgroundColor=f0e6d2">
                    </a>
                </div>

                <a href="../../index.html" class="logout-btn-link">Logout</a>

            </div>

        </div>


        <!-- HERO SECTION -->

        <div class="hero-section">

            <div class="hero-left" id="hero-container">
                <!-- Dynamic Content Loaded via JS -->
            </div>

            <div class="hero-right">

                <h2>Smart Concierge</h2>

                <p>
                    Personalized lunch recommendations
                    based on your schedule.
                </p>

                <div class="wait-box">
                    Avg. Wait: 8 mins
                </div>

                <a href="student_order.html" class="optimize-btn">
                    Go to checkout
                </a>

            </div>

        </div>


        <!-- WEEKLY SPECIALS -->

        <div class="section">

            <h2 class="section-title">Weekly Specials</h2>

            <div class="cards" id="weekly-specials-container">
                <!-- Dynamic Content Loaded via JS -->
            </div>

        </div>

        <!-- FLASH SALE -->

<div class="flash-sale">

    <div class="flash-left" id="flash-sale-container">
        <!-- Dynamic Content Loaded via JS -->
    </div>


    <div class="flash-right">

        <img src="https://images.unsplash.com/photo-1621506289937-a8e4df240d0b?q=80&w=1200&auto=format&fit=crop">

        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=1200&auto=format&fit=crop">

    </div>

</div>


        <!-- MAIN MENU -->

        <div class="section">

            <h2 class="section-title">Main Menu</h2>

            <div class="cards" id="main-menu-container">
                <!-- Dynamic Content Loaded via JS -->
            </div>

        </div>

    </div>
    <script src="../../js/site.js" defer></script>
    <script src="../../js/student/student_dashboard.js" defer></script>

</body>

</html>
